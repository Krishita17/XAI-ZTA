# Neural Network Configuration (sklearn MLPClassifier)
model:
  name: neural_network
  type: MLPClassifier

architecture:
  hidden_layers: [128, 64, 32]
  activation: relu
  solver: adam

training:
  learning_rate: 0.001
  batch_size: 1024
  max_iter: 100
  early_stopping: true
  early_stopping_patience: 10
  validation_fraction: 0.1
  test_size: 0.2

regularization:
  alpha: 0.0001
