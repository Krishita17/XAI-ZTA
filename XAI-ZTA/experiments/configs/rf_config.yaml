# Random Forest Configuration
model:
  name: random_forest
  type: sklearn.ensemble.RandomForestClassifier
  
hyperparameters:
  n_estimators: 200
  max_depth: 15
  class_weight: balanced
  random_state: 42
  n_jobs: -1
  min_samples_split: 5
  min_samples_leaf: 2

training:
  test_size: 0.2
  cv_folds: 5
  scoring: f1_weighted
  
feature_selection:
  method: importance_threshold
  threshold: 0.01
